<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaggle Shop Clone - Bảo Trân Xinh Gái</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header / Navbar -->
    <header>
        <nav class="navbar">
            <div class="logo">GAGGLE<span>.FUN</span></div>
            <ul class="nav-links">
                <li><a href="#">Trang chủ</a></li>
                <li><a href="#">Cửa hàng</a></li>
                <li><a href="#">Liên hệ</a></li>
            </ul>
            <div class="cart-icon">🛒 Giỏ hàng (0)</div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Sáng tạo không giới hạn</h1>
            <p>Khám phá những sản phẩm độc đáo nhất dành riêng cho cộng đồng của chúng tôi.</p>
            <button class="btn-primary">Mua ngay thôi!</button>
        </div>
    </section>

    <!-- Product Grid -->
    <section class="products">
        <h2>Sản phẩm nổi bật</h2>
        <div class="product-container">
            <!-- Product 1 -->
            <div class="product-card">
                <div class="product-img"><img src="ao1.jpg" alt="Sản phẩm" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;"></div>
                <h3>Áo Thun Gaggle</h3>
                <p>250.000đ</p>
                <button class="btn-secondary">Thêm vào giỏ</button>
            </div>
            <!-- Product 2 -->
            <div class="product-card">
                <div class="product-img"><img src="ao2.jpg" alt="Sản phẩm" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;"></div>
                <h3>Nón Snapback</h3>
                <p>180.000đ</p>
                <button class="btn-secondary">Thêm vào giỏ</button>
            </div>
            <!-- Product 3 -->
            <div class="product-card">
                <div class="product-img"><img src="ao3.jpg" alt="Sản phẩm" style="width: 100%; height: 100%; object-fit: cover; border-radius: 10px;"></div>
                <h3>Sticker Pack</h3>
                <p>50.000đ</p>
                <button class="btn-secondary">Thêm vào giỏ</button>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Made with ❤️ for Bảo Trân</p>
    </footer>

</body>

</html>
